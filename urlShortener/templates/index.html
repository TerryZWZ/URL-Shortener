<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width = device-width, initial-scale = 1.0">
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'styles.css' %}">
    <title>URL Shortener</title>
</head>

<body>
    <div id="container">
        <div id="urlForm">
            <h2>Shorten a URL!</h2>
            <form method="POST" action="/create/">
                {% csrf_token %}
                {{ form.as_p }}
                <button id="createURL">CREATE</button>
            </form>
        </div>

        {% if chars %}
        <div id="resultCard">
            <h1>Your Short URL: <br>
                <a target="_blank" href="https://tzwz.up.railway.app/{{ chars }}">tzwz.up.railway.app/{{ chars }}</a>
            </h1>
        </div>
        {% endif %}
    </div>
</body>

</html>
